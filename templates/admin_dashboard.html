{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

    <h2 class="mb-4 text-center">Admin Dashboard</h2>

    <div class="row text-center">

        <div class="col-md-3 mb-3">
            <div class="card shadow bg-dark text-white">
                <div class="card-body">
                    <h5>Total Tickets</h5>
                    <h3>{{ total }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card shadow bg-primary text-white">
                <div class="card-body">
                    <h5>Open</h5>
                    <h3>{{ open_count }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card shadow bg-info text-white">
                <div class="card-body">
                    <h5>In Progress</h5>
                    <h3>{{ progress_count }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card shadow bg-success text-white">
                <div class="card-body">
                    <h5>Closed</h5>
                    <h3>{{ closed_count }}</h3>
                </div>
            </div>
        </div>

    </div>

    <div class="text-center mt-4">
        <a href="{{ url_for('view_tickets') }}" class="btn btn-outline-dark">
            View All Tickets
        </a>
    </div>

</div>

{% endblock %}
